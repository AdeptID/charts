{{- range .Values.subscriptions }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Subscription
metadata:
  name: {{ include "cluster.fullname" $ }}-{{ .name | replace "_" "-" }}
  namespace: {{ include "cluster.namespace" $ }}
  {{- with $.Values.cluster.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
  {{- include "cluster.labels" $ | nindent 4 }}
  {{- with $.Values.cluster.additionalLabels }}
    {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  name: {{ .name }}
  cluster:
    name: {{ include "cluster.fullname" $ }}
  dbname: {{ .dbname }}
  publicationName: {{ .publicationName }}
  externalClusterName: {{ .externalClusterName }}
  {{- with .parameters }}
  parameters:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  subscriptionReclaimPolicy: {{ .subscriptionReclaimPolicy | default "retain" }}
{{- end }}
