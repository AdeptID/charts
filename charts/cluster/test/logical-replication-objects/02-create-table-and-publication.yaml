apiVersion: batch/v1
kind: Job
metadata:
  name: create-table-and-publication
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-table
        env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: publisher-cluster-superuser
                key: username
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: publisher-cluster-superuser
                key: password
          - name: DB_URI
            value: postgres://$(DB_USER):$(DB_PASS)@publisher-cluster-rw:5432/app
        image: alpine:3.19
        command: ['sh', '-c']
        args:
         - |
           set -e
           apk --no-cache add postgresql-client
           # Create users table (will be published)
           psql "$DB_URI" -c "CREATE TABLE users (id serial PRIMARY KEY, name text, email text, created_at timestamp DEFAULT now());"
           # Create orders table (will NOT be published)
           psql "$DB_URI" -c "CREATE TABLE orders (id serial PRIMARY KEY, user_id int, amount decimal, created_at timestamp DEFAULT now());"
           # Insert initial data into users
           psql "$DB_URI" -c "INSERT INTO users (name, email) VALUES ('Alice', 'alice@example.com'), ('Bob', 'bob@example.com'), ('Charlie', 'charlie@example.com');"
           # Insert initial data into orders
           psql "$DB_URI" -c "INSERT INTO orders (user_id, amount) VALUES (1, 100.00), (2, 200.00), (3, 300.00);"
           # Verify data was inserted
           test "$(psql "$DB_URI" -t -c 'SELECT COUNT(*) FROM users;' --csv -q | tr -d ' ')" = "3"
           echo "users table has 3 rows"
           test "$(psql "$DB_URI" -t -c 'SELECT COUNT(*) FROM orders;' --csv -q | tr -d ' ')" = "3"
           echo "orders table has 3 rows"
