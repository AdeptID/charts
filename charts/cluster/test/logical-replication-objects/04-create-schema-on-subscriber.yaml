apiVersion: batch/v1
kind: Job
metadata:
  name: create-schema-on-subscriber
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-schema
        env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: subscriber-cluster-superuser
                key: username
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: subscriber-cluster-superuser
                key: password
          - name: DB_URI
            value: postgres://$(DB_USER):$(DB_PASS)@subscriber-cluster-rw:5432/app
        image: alpine:3.19
        command: ['sh', '-c']
        args:
         - |
           set -e
           apk --no-cache add postgresql-client
           # Create ONLY the users table schema (NOT orders)
           # This is required for CNPG logical replication - the schema must pre-exist
           # We intentionally do NOT create the orders table to verify it's not replicated
           psql "$DB_URI" -c "CREATE TABLE IF NOT EXISTS users (id serial PRIMARY KEY, name text, email text, created_at timestamp DEFAULT now());"
           test "$(psql "$DB_URI" -t -c "SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_name = 'users');" --csv -q)" = "t"
           echo "users table exists on subscriber (orders table NOT created)"
