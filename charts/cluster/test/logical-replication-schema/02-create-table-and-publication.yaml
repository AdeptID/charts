apiVersion: batch/v1
kind: Job
metadata:
  name: create-table-and-publication
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-table
        env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: publisher-cluster-superuser
                key: username
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: publisher-cluster-superuser
                key: password
          - name: DB_URI
            value: postgres://$(DB_USER):$(DB_PASS)@publisher-cluster-rw:5432/app
        image: alpine:3.19
        command: ['sh', '-c']
        args:
         - |
           set -e
           apk --no-cache add postgresql-client
           # Create replicated_schema (will be published)
           psql "$DB_URI" -c "CREATE SCHEMA replicated_schema;"
           # Create excluded_schema (will NOT be published)
           psql "$DB_URI" -c "CREATE SCHEMA excluded_schema;"
           # Create table in replicated_schema
           psql "$DB_URI" -c "CREATE TABLE replicated_schema.data (id serial PRIMARY KEY, value text, created_at timestamp DEFAULT now());"
           # Create table in excluded_schema
           psql "$DB_URI" -c "CREATE TABLE excluded_schema.data (id serial PRIMARY KEY, value text, created_at timestamp DEFAULT now());"
           # Insert initial data into replicated_schema
           psql "$DB_URI" -c "INSERT INTO replicated_schema.data (value) VALUES ('replicated_row_1'), ('replicated_row_2'), ('replicated_row_3');"
           # Insert initial data into excluded_schema
           psql "$DB_URI" -c "INSERT INTO excluded_schema.data (value) VALUES ('excluded_row_1'), ('excluded_row_2'), ('excluded_row_3');"
           # Verify data was inserted
           echo "replicated_schema.data table:"
           psql "$DB_URI" -c "SELECT COUNT(*) FROM replicated_schema.data;"
           echo "excluded_schema.data table:"
           psql "$DB_URI" -c "SELECT COUNT(*) FROM excluded_schema.data;"
           echo "Schemas and tables created with initial data"
