apiVersion: batch/v1
kind: Job
metadata:
  name: create-schema-on-subscriber
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-schema
        env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: subscriber-cluster-superuser
                key: username
          - name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: subscriber-cluster-superuser
                key: password
          - name: DB_URI
            value: postgres://$(DB_USER):$(DB_PASS)@subscriber-cluster-rw:5432/app
        image: alpine:3.19
        command: ['sh', '-c']
        args:
         - |
           set -e
           apk --no-cache add postgresql-client
           # Create ONLY replicated_schema and its table (NOT excluded_schema)
           # This is required for CNPG logical replication - the schema must pre-exist
           psql "$DB_URI" -c "CREATE SCHEMA IF NOT EXISTS replicated_schema;"
           psql "$DB_URI" -c "CREATE TABLE IF NOT EXISTS replicated_schema.data (id serial PRIMARY KEY, value text, created_at timestamp DEFAULT now());"
           echo "replicated_schema created on subscriber (excluded_schema NOT created)"
